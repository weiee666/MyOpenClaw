apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-user-service
  labels:
    app.kubernetes.io/name: openclaw-user-backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-user-backend
  namespace: openclaw-user-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-user-backend
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "persistentvolumeclaims", "services", "pods"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-user-backend
subjects:
  - kind: ServiceAccount
    name: openclaw-user-backend
    namespace: openclaw-user-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-user-backend
